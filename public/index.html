<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyHomepage 테스트 페이지</title>
    <meta
      name="description"
      content="GitHub Pages 배포 상태를 확인하기 위한 MyHomepage 테스트 페이지입니다."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <p class="eyebrow">GitHub Pages Ready</p>
        <h1>테스트 페이지가 정상적으로 배포되었습니다.</h1>
        <p class="description">
          지금은 GitHub Pages로 먼저 공개하고, 이후 원하는 시점에 커스텀 도메인으로 전환할 수 있도록
          최소 구성으로 준비한 상태입니다.
        </p>
        <div class="actions">
          <a
            class="button primary"
            href="https://github.com/Jeong-Jin-Yong/MyHomeapge"
            target="_blank"
            rel="noreferrer"
            >저장소 확인</a
          >
          <a class="button secondary" href="./404.html">404 페이지 확인</a>
        </div>
      </section>

      <section class="status-card" aria-labelledby="status-heading">
        <h2 id="status-heading">현재 상태</h2>
        <ul>
          <li>정적 테스트 페이지 구성 완료</li>
          <li>GitHub Actions 기반 Pages 배포 워크플로 추가</li>
          <li>추후 커스텀 도메인 연결 가능한 구조</li>
        </ul>
      </section>
    </main>
  </body>
</html>
